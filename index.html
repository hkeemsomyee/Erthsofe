<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مكتبة الإرث الصوفي - الأرشيف الرقمي</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f9f7f2; margin: 0; padding: 0; }
        header { background: #4e342e; color: #dcb25c; text-align: center; padding: 30px; border-bottom: 4px solid #dcb25c; }
        
        .library-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            padding: 40px;
        }

        .book-item {
            background: #fff;
            border: 1px solid #e0d7c6;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: 0.3s;
        }

        .book-item:hover { transform: scale(1.03); box-shadow: 0 6px 12px rgba(0,0,0,0.1); }

        .book-icon { font-size: 50px; color: #a1887f; margin-bottom: 10px; }
        
        .book-title { font-weight: bold; color: #3e2723; margin-bottom: 15px; display: block; }

        .btn-read {
            background: #dcb25c;
            color: #3e2723;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 5px;
            font-weight: bold;
            display: inline-block;
        }

        .btn-read:hover { background: #4e342e; color: #fff; }

        footer { text-align: center; padding: 20px; color: #8d6e63; font-size: 0.9em; }
    </style>
</head>
<body>

<header>
    <h1>مكتبة الإرث الصوفي</h1>
    <p>فهرس المخطوطات والكتب الرقمية</p>
</header>

<div class="library-grid">

    <div class="book-item">
        <div class="book-icon">📖</div>
        <span class="book-title">الملف الرقمي: TE1</span>
        <p>مخطوطة صوفية نادرة</p>
        <a href="te1.pdf" target="_blank" class="btn-read">فتح ملف PDF</a>
    </div>

    <div class="book-item">
        <div class="book-icon">📖</div>
        <span class="book-title">الملف الرقمي: TE2</span>
        <p>شروحات وحكم</p>
        <a href="te2.pdf" target="_blank" class="btn-read">فتح ملف PDF</a>
    </div>

    <div class="book-item">
        <div class="book-icon">📖</div>
        <span class="book-title">الملف الرقمي: TE3</span>
        <p>رسائل العارفين</p>
        <a href="te3.pdf" target="_blank" class="btn-read">فتح ملف PDF</a>
    </div>

</div>

<footer>
    <p>مكتبة الإرث الصوفي &copy; 2026</p>
</footer>

</body>
</html>
